<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <!--
    Capybara Carrot — waking (1-shot)
    Walk right → flip → walk left → flip → center
    Leg sway ±10deg during walk segments, eyes blink open
  -->
  <style>
    @keyframes cap-wake-obj {
      0%, 4%     { transform: translate(0, 0)    scaleX(1); }
      42%        { transform: translate(3px, 0)   scaleX(1); }
      44%        { transform: translate(3px, 0)   scaleX(0.3); }
      47%        { transform: translate(3px, 0)   scaleX(0); }
      48%        { transform: translate(3px, 0)   scaleX(-0.3); }
      50%        { transform: translate(3px, 0)   scaleX(-1); }
      82%        { transform: translate(-3px, 0)  scaleX(-1); }
      84%        { transform: translate(-3px, 0)  scaleX(-0.3); }
      87%        { transform: translate(-3px, 0)  scaleX(0); }
      88%        { transform: translate(-3px, 0)  scaleX(1); }
      100%       { transform: translate(0, 0)     scaleX(1); }
    }
    @keyframes cap-wake-shadow {
      0%, 4%     { transform: translate(-4.2px, 14.5px); }
      42%        { transform: translate(-1.2px, 14.5px); }
      44%, 50%   { transform: translate(-1.2px, 14.5px); }
      82%        { transform: translate(-7.2px, 14.5px); }
      84%, 88%   { transform: translate(-7.2px, 14.5px); }
      100%       { transform: translate(-4.2px, 14.5px); }
    }
    @keyframes cap-wake-leg-front {
      0%, 4%     { transform: translate(3.8px, 15px); }
      10%        { transform: translate(3.8px, 15px) rotate(10deg); }
      17%        { transform: translate(3.8px, 15px); }
      23%        { transform: translate(3.8px, 15px) rotate(10deg); }
      30%        { transform: translate(3.8px, 15px); }
      36%        { transform: translate(3.8px, 15px) rotate(10deg); }
      42%, 50%   { transform: translate(3.8px, 15px); }
      56%        { transform: translate(3.8px, 15px) rotate(10deg); }
      63%        { transform: translate(3.8px, 15px); }
      69%        { transform: translate(3.8px, 15px) rotate(10deg); }
      76%        { transform: translate(3.8px, 15px); }
      78%        { transform: translate(3.8px, 15px) rotate(10deg); }
      82%, 88%   { transform: translate(3.8px, 15px); }
      94%        { transform: translate(3.8px, 15px) rotate(10deg); }
      100%       { transform: translate(3.8px, 15px); }
    }
    @keyframes cap-wake-leg-back {
      0%, 4%     { transform: translate(-2px, 14px); }
      10%        { transform: translate(-2px, 14px) rotate(-10deg); }
      17%        { transform: translate(-2px, 14px); }
      23%        { transform: translate(-2px, 14px) rotate(-10deg); }
      30%        { transform: translate(-2px, 14px); }
      36%        { transform: translate(-2px, 14px) rotate(-10deg); }
      42%, 50%   { transform: translate(-2px, 14px); }
      56%        { transform: translate(-2px, 14px) rotate(-10deg); }
      63%        { transform: translate(-2px, 14px); }
      69%        { transform: translate(-2px, 14px) rotate(-10deg); }
      76%        { transform: translate(-2px, 14px); }
      78%        { transform: translate(-2px, 14px) rotate(-10deg); }
      82%, 88%   { transform: translate(-2px, 14px); }
      94%        { transform: translate(-2px, 14px) rotate(-10deg); }
      100%       { transform: translate(-2px, 14px); }
    }
    @keyframes cap-wake-blink {
      0%, 5%     { opacity: 0; }
      8%         { opacity: 0.5; }
      12%, 100%  { opacity: 1; }
    }
    @keyframes cap-wake-closed {
      0%, 5%     { opacity: 1; }
      8%         { opacity: 0.5; }
      12%, 100%  { opacity: 0; }
    }

    #cap-wake-obj        { transform-origin: 6px 10px; animation: cap-wake-obj 5s ease-in-out forwards 1; }
    #cap-wake-shadow     { animation: cap-wake-shadow 5s ease-in-out forwards 1; }
    #cap-wake-leg-front  { animation: cap-wake-leg-front 5s ease-in-out forwards 1; }
    #cap-wake-leg-back   { animation: cap-wake-leg-back 5s ease-in-out forwards 1; }
    #cap-wake-eyes-open  { opacity: 0; animation: cap-wake-blink 5s ease-in-out forwards 1; }
    #cap-wake-eyes-shut  { opacity: 1; animation: cap-wake-closed 5s ease-in-out forwards 1; }
  </style>

  <!-- Shadow -->
  <g id="cap-wake-shadow" transform="translate(-4.2, 14.5)">
    <rect width="20" height="2.5" transform="matrix(-1 0 0 1 20 1.83252)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="16.9231" height="0.625" transform="matrix(-1 0 0 1 18.4614 1.20752)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="16.9231" height="0.625" transform="matrix(-1 0 0 1 18.4614 4.33252)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="13.8462" height="0.625" transform="matrix(-1 0 0 1 16.9233 0.58252)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="13.8462" height="0.625" transform="matrix(-1 0 0 1 16.9233 4.95752)" fill="#2B4447" fill-opacity="0.1"/>
  </g>

  <g id="cap-wake-obj">
    <!-- Legs (sway ±10deg during walk) -->
    <g id="cap-wake-leg-front" transform="translate(3.8, 15)">
      <path d="M8.08245 0.0825195H6.12369V2.62891H8.08245V0.0825195Z" fill="#C17B46"/>
      <path d="M2.20617 0.0825195H0.247406V2.62891H2.20617V0.0825195Z" fill="#C17B46"/>
    </g>
    <g id="cap-wake-leg-back" transform="translate(-2, 14)">
      <path d="M4.28865 0.886719H0.371124V3.62898H4.28865V0.886719Z" fill="#C17B46"/>
    </g>

    <g transform="translate(-3.2, 6.1)">
      <path d="M9.98971 0.876343H3.32993V4.59799H9.98971V0.876343Z" fill="#C17B46"/>
      <path d="M15.0825 2.83508H0V10.6701H15.0825V2.83508Z" fill="#C17B46"/>
      <path d="M15.0824 6.75256H7.24741V8.71132H15.0824V6.75256Z" fill="#A56235"/>
      <path d="M13.1237 8.5155H9.20615V10.6701H13.1237V8.5155Z" fill="#A56235"/>
      <path d="M7.24743 4.79382H5.28867V6.75258H7.24743V4.79382Z" fill="#A56235"/>
    </g>

    <g transform="translate(5.2, -3.8)">
      <path d="M4.12371 0H2.16495V2.15464H4.12371V0Z" fill="#4AFF79"/>
      <path d="M6.08243 1.95874H0.206146V6.07214H6.08243V1.95874Z" fill="#FF8948"/>
    </g>

    <g transform="translate(0, 0)">
      <g>
        <path d="M14.0412 0H11.299V2.54639H14.0412V0Z" fill="#8E654A"/>
        <path d="M16 1.95886H2.28867V9.79391H16V1.95886Z" fill="#C17B46"/>
        <path d="M16 9.01038H4.24741V11.7526H16V9.01038Z" fill="#C17B46"/>
        <path d="M16 7.83508H8.16495V11.7526H16V7.83508Z" fill="#7C4B32"/>
        <path d="M16 5.87634H10.1237V8.22686H16V5.87634Z" fill="#7C4B32"/>
        <path d="M4.24745 0H0.329926V3.91752H4.24745V0Z" fill="#8E654A"/>
        <!-- Open eyes (fade in) -->
        <g id="cap-wake-eyes-open">
          <path d="M7.38144 4.70105H4.4433V5.87631H7.38144V4.70105Z" fill="black"/>
        </g>
        <!-- Closed eyes (fade out) -->
        <g id="cap-wake-eyes-shut">
          <rect x="4.2" y="5.0" width="3.4" height="0.6" fill="black"/>
        </g>
      </g>
    </g>
  </g>
</svg>

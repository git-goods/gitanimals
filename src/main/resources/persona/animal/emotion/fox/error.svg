<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <!--
    Dessert Fox — error state
    Base: idle-follow.svg (standing)
    Changes:
      - Eyes: X X (rotated rects, clawd-error.svg technique)
      - obj: left-right shake, decaying (3s cycle)
      - Shadow: follows shake
      - Legs: 0.6s (slightly fast, stressed)
      - Head: nested group (no neck gap), mostly static
      - Red ! prop flashing (0.8s, opacity 1→0.15)
    Keyframe prefix: dessert-fox-*{id}-error-*
  -->
  <style>
    @keyframes dessert-fox-*{id}-error-leg-left {
      0%   { transform: translate(5px, 5px); }
      50%  { transform: translate(5px, 5px) rotate(10deg); }
      100% { transform: translate(5px, 5px); }
    }
    @keyframes dessert-fox-*{id}-error-leg-right {
      0%   { transform: translate(8px, 5px); }
      50%  { transform: translate(8px, 5px) rotate(-10deg); }
      100% { transform: translate(8px, 5px); }
    }
    /* delta-only head nod — mild, mostly still */
    @keyframes dessert-fox-*{id}-error-head-nod {
      0%   { transform: translate(0, 0) rotate(0deg); }
      50%  { transform: translate(0, -0.5px) rotate(0deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
    /* shake: strong start, decaying, pause at end */
    @keyframes dessert-fox-*{id}-error-obj {
      0%        { transform: translate(0, 0); }
      7%        { transform: translate(-1.5px, 0); }
      14%       { transform: translate(1.5px, 0); }
      21%       { transform: translate(-1.5px, 0); }
      28%       { transform: translate(1.5px, 0); }
      35%       { transform: translate(-1px, 0); }
      42%       { transform: translate(1px, 0); }
      49%       { transform: translate(-0.5px, 0); }
      56%       { transform: translate(0.5px, 0); }
      63%, 100% { transform: translate(0, 0); }
    }
    /* shadow follows shake (x offset mirrors obj) */
    @keyframes dessert-fox-*{id}-error-shadow {
      0%        { transform: translate(3px, 7px) scaleX(1); }
      7%        { transform: translate(1.5px, 7px) scaleX(1); }
      14%       { transform: translate(4.5px, 7px) scaleX(1); }
      21%       { transform: translate(1.5px, 7px) scaleX(1); }
      28%       { transform: translate(4.5px, 7px) scaleX(1); }
      35%       { transform: translate(2px, 7px) scaleX(1); }
      42%       { transform: translate(4px, 7px) scaleX(1); }
      49%       { transform: translate(2.5px, 7px) scaleX(1); }
      56%       { transform: translate(3.5px, 7px) scaleX(1); }
      63%, 100% { transform: translate(3px, 7px) scaleX(1); }
    }
    /* red ! flash */
    @keyframes dessert-fox-*{id}-error-exclam {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.15; }
    }

    #dessert-fox-*{id}-error-shadow {
      animation: dessert-fox-*{id}-error-shadow 3s ease-in-out infinite;
    }
    #dessert-fox-*{id}-error-obj {
      animation: dessert-fox-*{id}-error-obj 3s ease-in-out infinite;
    }
    #dessert-fox-*{id}-error-leg-left {
      animation: dessert-fox-*{id}-error-leg-left 0.6s ease-in-out infinite;
    }
    #dessert-fox-*{id}-error-leg-right {
      animation: dessert-fox-*{id}-error-leg-right 0.6s ease-in-out infinite;
    }
    #dessert-fox-*{id}-error-head-nod {
      animation: dessert-fox-*{id}-error-head-nod 2s ease-in-out infinite;
    }
    #dessert-fox-*{id}-error-exclam {
      animation: dessert-fox-*{id}-error-exclam 0.8s ease-in-out infinite;
    }
  </style>

  <!-- Shadow (follows shake) -->
  <g id="dessert-fox-*{id}-error-shadow" transform="translate(3, 7)">
    <rect width="8" height="1" transform="matrix(-1 0 0 1 8 0.5)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="6.76923" height="0.25" transform="matrix(-1 0 0 1 7.38452 0.25)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="6.76923" height="0.25" transform="matrix(-1 0 0 1 7.38452 1.5)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="5.53846" height="0.25" transform="matrix(-1 0 0 1 6.76929 0)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="5.53846" height="0.25" transform="matrix(-1 0 0 1 6.76929 1.75)" fill="#2B4447" fill-opacity="0.1"/>
  </g>

  <!-- obj: legs + body + head (shake group) -->
  <g id="dessert-fox-*{id}-error-obj">
    <!-- Legs (stressed, 0.6s) -->
    <g id="dessert-fox-*{id}-error-leg-left" transform="translate(5, 5)">
      <rect width="2" height="3" fill="#DDD7B5"/>
    </g>
    <g id="dessert-fox-*{id}-error-leg-right" transform="translate(8, 5)">
      <rect width="2" height="3" fill="#DDD7B5"/>
    </g>

    <!-- Body -->
    <g transform="translate(-2, 2)">
      <rect x="2" y="2" width="3" height="1" fill="#F5F5F7"/>
      <rect x="3" y="3" width="3" height="1" fill="#F5F5F7"/>
      <rect y="3" width="2" height="1" fill="#F5F5F7"/>
      <rect x="3" y="2" width="8" height="1" fill="#DDD7B5"/>
      <rect x="7" width="6" height="4" fill="#DDD7B5"/>
      <rect x="7" y="2" width="6" height="2" fill="#DDD7B5"/>
      <rect x="4" y="2" width="8" height="2" fill="#DDD7B5"/>
      <rect x="6" y="1" width="7" height="3" fill="#DDD7B5"/>
      <rect x="6" y="3" width="7" height="2" fill="#DDD7B5"/>
      <rect x="9" y="2" width="3" height="3" fill="#F5F5F7"/>
      <rect x="8" y="3" width="3" height="2" fill="#F5F5F7"/>
      <rect x="7" y="4" width="3" height="1" fill="#F5F5F7"/>
      <rect x="2" y="1" width="2" height="1" fill="#DDD7B5"/>
      <rect x="1" y="2" width="1" height="1" fill="#DDD7B5"/>
      <rect y="3" width="1" height="1" fill="#DDD7B5"/>
      <rect x="4" y="3" width="2" height="1" fill="black" fill-opacity="0.1"/>
      <rect x="6" y="4" width="2" height="1" fill="black" fill-opacity="0.1"/>
      <rect x="3" y="2" width="1" height="1" fill="black" fill-opacity="0.1"/>
    </g>

    <!-- Head: outer = static position, inner = delta only -->
    <g transform="translate(0, -5)">
      <g id="dessert-fox-*{id}-error-head-nod">
        <rect x="7" y="2" width="4" height="5" fill="#DDD7B5"/>
        <rect x="9" y="5" width="2" height="2" fill="#F5F5F7"/>
        <rect x="6" y="3" width="6" height="4" fill="#DDD7B5"/>
        <rect x="8" y="6" width="4" height="1" fill="#F5F5F7"/>
        <rect x="8" y="6" width="3" height="2" fill="#F5F5F7"/>
        <rect x="6" y="3" width="6" height="1" fill="#DDD7B5"/>
        <rect x="3" y="4" width="12" height="1" fill="#DDD7B5"/>
        <rect x="5" y="3" width="8" height="3" fill="#DDD7B5"/>
        <rect x="7" y="7" width="4" height="1" fill="#DDD7B5"/>
        <!-- Left ear -->
        <rect x="1" y="2" width="4" height="1" fill="#DDD7B5"/>
        <rect y="1" width="4" height="1" fill="#DDD7B5"/>
        <rect x="1" width="2" height="3" fill="#DDD7B5"/>
        <rect x="1" y="1" width="2" height="1" fill="#FBB3BE"/>
        <rect x="2" y="1" width="1" height="2" fill="#FBB3BE"/>
        <rect x="2" y="2" width="2" height="2" fill="#FBB3BE"/>
        <rect x="3" y="3" width="2" height="2" fill="#FBB3BE"/>
        <rect x="3" y="4" width="3" height="1" fill="#FBB3BE"/>
        <!-- Right ear -->
        <rect x="13" y="2" width="4" height="1" fill="#DDD7B5"/>
        <rect x="14" y="1" width="4" height="1" fill="#DDD7B5"/>
        <rect x="15" width="2" height="3" fill="#DDD7B5"/>
        <rect x="15" y="1" width="2" height="1" fill="#FBB3BE"/>
        <rect x="15" y="1" width="1" height="2" fill="#FBB3BE"/>
        <rect x="14" y="2" width="2" height="2" fill="#FBB3BE"/>
        <rect x="13" y="3" width="2" height="2" fill="#FBB3BE"/>
        <rect x="12" y="4" width="3" height="1" fill="#FBB3BE"/>
        <!-- Nose -->
        <rect x="10" y="6" width="1" height="1" fill="black"/>
        <!-- Muzzle highlight -->
        <rect x="7" y="7" width="4" height="1" fill="#F5F5F7"/>
        <rect x="9" y="5" width="3" height="1" fill="#F5F5F7"/>
        <!-- Shadow under muzzle -->
        <rect x="7" y="7" width="2" height="1" fill="black" fill-opacity="0.1"/>
        <rect x="6" y="6" width="1" height="1" fill="black" fill-opacity="0.1"/>
        <!-- Eyes: X X (rotated rects centered exactly on eye center) -->
        <!-- Each rect: w=0.5 h=2.4, center = eye center (8.5,5) / (11.5,5) -->
        <!-- Rect origin (top-left) = center - (w/2, h/2) = center - (0.25, 1.2) -->
        <!-- Left X centered at (8.5, 5) -->
        <rect x="8.25" y="3.8" width="0.5" height="2.4" transform="rotate(45 8.5 5)"  fill="black"/>
        <rect x="8.25" y="3.8" width="0.5" height="2.4" transform="rotate(-45 8.5 5)" fill="black"/>
        <!-- Right X centered at (11.5, 5) -->
        <rect x="11.25" y="3.8" width="0.5" height="2.4" transform="rotate(45 11.5 5)"  fill="black"/>
        <rect x="11.25" y="3.8" width="0.5" height="2.4" transform="rotate(-45 11.5 5)" fill="black"/>
      </g>
    </g>
  </g>

  <!-- Red ! flashing (outside obj — floats independently) -->
  <g id="dessert-fox-*{id}-error-exclam" transform="translate(15, -13)">
    <rect x="0" y="0" width="2" height="5" fill="#FF3B30"/>
    <rect x="0" y="6" width="2" height="2" fill="#FF3B30"/>
  </g>
</svg>

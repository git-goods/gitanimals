<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <!--
    Dessert Fox — notification state
    Base: idle-follow.svg (standing)
    Changes:
      - Yellow ! exclamation prop (pop-in / hold / fade, 3.5s cycle)
      - obj: startle jump (high first bounce, decaying) timed with ! pop
      - Shadow: shrinks during jump, expands on land
      - Legs: fast (0.5s) for startled feel
      - Head: nested group pattern (position/delta separated) — no neck gap
    Keyframe prefix: dessert-fox-*{id}-notif-*
  -->
  <style>
    @keyframes dessert-fox-*{id}-notif-leg-left {
      0%   { transform: translate(5px, 5px); }
      50%  { transform: translate(5px, 5px) rotate(10deg); }
      100% { transform: translate(5px, 5px); }
    }
    @keyframes dessert-fox-*{id}-notif-leg-right {
      0%   { transform: translate(8px, 5px); }
      50%  { transform: translate(8px, 5px) rotate(-10deg); }
      100% { transform: translate(8px, 5px); }
    }
    /* delta-only head nod — same as idle-follow */
    @keyframes dessert-fox-*{id}-notif-head-nod {
      0%   { transform: translate(0, 0) rotate(0deg); }
      50%  { transform: translate(2px, -1px) rotate(10deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
    /* startle jump: big first bounce, decaying, then idle bob */
    @keyframes dessert-fox-*{id}-notif-obj {
      0%          { transform: translate(0, 0); }
      10%         { transform: translate(0, 1px); }
      20%         { transform: translate(0, -9px); }
      28%         { transform: translate(0, 1.5px); }
      35%         { transform: translate(0, -5px); }
      42%         { transform: translate(0, 1px); }
      48%         { transform: translate(0, -2px); }
      53%         { transform: translate(0, 0); }
      /* settle back to gentle idle bob */
      65%         { transform: translate(0, 0); }
      72%         { transform: translate(0, -2.5px); }
      80%         { transform: translate(0, 0); }
      100%        { transform: translate(0, 0); }
    }
    /* shadow shrinks in air, expands on impact */
    @keyframes dessert-fox-*{id}-notif-shadow {
      0%          { transform: translate(3px, 7px) scaleX(1); }
      10%         { transform: translate(3px, 7px) scaleX(1.05); }
      20%         { transform: translate(3px, 7px) scaleX(0.45); }
      28%         { transform: translate(3px, 7px) scaleX(1.2); }
      35%         { transform: translate(3px, 7px) scaleX(0.65); }
      42%         { transform: translate(3px, 7px) scaleX(1.1); }
      48%         { transform: translate(3px, 7px) scaleX(0.85); }
      53%         { transform: translate(3px, 7px) scaleX(1); }
      65%, 100%   { transform: translate(3px, 7px) scaleX(1); }
      72%         { transform: translate(3px, 7px) scaleX(1.2); }
      80%         { transform: translate(3px, 7px) scaleX(1); }
    }
    /* ! pop-in synced with startle (3.5s = same total cycle) */
    @keyframes dessert-fox-*{id}-notif-exclam {
      0%    { transform: translate(15px, -13px) scale(0);   opacity: 0; }
      8%    { transform: translate(15px, -13px) scale(1.3); opacity: 1; }
      14%   { transform: translate(15px, -13px) scale(1);   opacity: 1; }
      65%   { transform: translate(15px, -13px) scale(1);   opacity: 1; }
      75%   { transform: translate(15px, -13px) scale(0.7); opacity: 0; }
      100%  { transform: translate(15px, -13px) scale(0);   opacity: 0; }
    }

    #dessert-fox-*{id}-notif-shadow {
      animation: dessert-fox-*{id}-notif-shadow 3.5s ease-in-out infinite;
    }
    #dessert-fox-*{id}-notif-obj {
      animation: dessert-fox-*{id}-notif-obj 3.5s ease-in-out infinite;
    }
    #dessert-fox-*{id}-notif-leg-left {
      animation: dessert-fox-*{id}-notif-leg-left 0.5s ease-in-out infinite;
    }
    #dessert-fox-*{id}-notif-leg-right {
      animation: dessert-fox-*{id}-notif-leg-right 0.5s ease-in-out infinite;
    }
    #dessert-fox-*{id}-notif-head-nod {
      animation: dessert-fox-*{id}-notif-head-nod 1s ease-in-out infinite;
    }
    #dessert-fox-*{id}-notif-exclam {
      opacity: 0;
      animation: dessert-fox-*{id}-notif-exclam 3.5s ease-in-out infinite;
    }
  </style>

  <!-- Shadow -->
  <g id="dessert-fox-*{id}-notif-shadow" transform="translate(3, 7)">
    <rect width="8" height="1" transform="matrix(-1 0 0 1 8 0.5)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="6.76923" height="0.25" transform="matrix(-1 0 0 1 7.38452 0.25)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="6.76923" height="0.25" transform="matrix(-1 0 0 1 7.38452 1.5)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="5.53846" height="0.25" transform="matrix(-1 0 0 1 6.76929 0)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="5.53846" height="0.25" transform="matrix(-1 0 0 1 6.76929 1.75)" fill="#2B4447" fill-opacity="0.1"/>
  </g>

  <!-- obj: legs + body + head (startle jump group) -->
  <g id="dessert-fox-*{id}-notif-obj">
    <!-- Legs (0.5s — fast/startled) -->
    <g id="dessert-fox-*{id}-notif-leg-left" transform="translate(5, 5)">
      <rect width="2" height="3" fill="#DDD7B5"/>
    </g>
    <g id="dessert-fox-*{id}-notif-leg-right" transform="translate(8, 5)">
      <rect width="2" height="3" fill="#DDD7B5"/>
    </g>

    <!-- Body -->
    <g transform="translate(-2, 2)">
      <rect x="2" y="2" width="3" height="1" fill="#F5F5F7"/>
      <rect x="3" y="3" width="3" height="1" fill="#F5F5F7"/>
      <rect y="3" width="2" height="1" fill="#F5F5F7"/>
      <rect x="3" y="2" width="8" height="1" fill="#DDD7B5"/>
      <rect x="7" width="6" height="4" fill="#DDD7B5"/>
      <rect x="7" y="2" width="6" height="2" fill="#DDD7B5"/>
      <rect x="4" y="2" width="8" height="2" fill="#DDD7B5"/>
      <rect x="6" y="1" width="7" height="3" fill="#DDD7B5"/>
      <rect x="6" y="3" width="7" height="2" fill="#DDD7B5"/>
      <rect x="9" y="2" width="3" height="3" fill="#F5F5F7"/>
      <rect x="8" y="3" width="3" height="2" fill="#F5F5F7"/>
      <rect x="7" y="4" width="3" height="1" fill="#F5F5F7"/>
      <rect x="2" y="1" width="2" height="1" fill="#DDD7B5"/>
      <rect x="1" y="2" width="1" height="1" fill="#DDD7B5"/>
      <rect y="3" width="1" height="1" fill="#DDD7B5"/>
      <rect x="4" y="3" width="2" height="1" fill="black" fill-opacity="0.1"/>
      <rect x="6" y="4" width="2" height="1" fill="black" fill-opacity="0.1"/>
      <rect x="3" y="2" width="1" height="1" fill="black" fill-opacity="0.1"/>
    </g>

    <!-- Head: outer = static position (no CSS), inner = delta only -->
    <g transform="translate(0, -5)">
      <g id="dessert-fox-*{id}-notif-head-nod">
        <rect x="7" y="2" width="4" height="5" fill="#DDD7B5"/>
        <rect x="9" y="5" width="2" height="2" fill="#F5F5F7"/>
        <rect x="6" y="3" width="6" height="4" fill="#DDD7B5"/>
        <rect x="8" y="6" width="4" height="1" fill="#F5F5F7"/>
        <rect x="8" y="6" width="3" height="2" fill="#F5F5F7"/>
        <rect x="6" y="3" width="6" height="1" fill="#DDD7B5"/>
        <rect x="3" y="4" width="12" height="1" fill="#DDD7B5"/>
        <rect x="5" y="3" width="8" height="3" fill="#DDD7B5"/>
        <rect x="7" y="7" width="4" height="1" fill="#DDD7B5"/>
        <!-- Left ear -->
        <rect x="1" y="2" width="4" height="1" fill="#DDD7B5"/>
        <rect y="1" width="4" height="1" fill="#DDD7B5"/>
        <rect x="1" width="2" height="3" fill="#DDD7B5"/>
        <rect x="1" y="1" width="2" height="1" fill="#FBB3BE"/>
        <rect x="2" y="1" width="1" height="2" fill="#FBB3BE"/>
        <rect x="2" y="2" width="2" height="2" fill="#FBB3BE"/>
        <rect x="3" y="3" width="2" height="2" fill="#FBB3BE"/>
        <rect x="3" y="4" width="3" height="1" fill="#FBB3BE"/>
        <!-- Right ear -->
        <rect x="13" y="2" width="4" height="1" fill="#DDD7B5"/>
        <rect x="14" y="1" width="4" height="1" fill="#DDD7B5"/>
        <rect x="15" width="2" height="3" fill="#DDD7B5"/>
        <rect x="15" y="1" width="2" height="1" fill="#FBB3BE"/>
        <rect x="15" y="1" width="1" height="2" fill="#FBB3BE"/>
        <rect x="14" y="2" width="2" height="2" fill="#FBB3BE"/>
        <rect x="13" y="3" width="2" height="2" fill="#FBB3BE"/>
        <rect x="12" y="4" width="3" height="1" fill="#FBB3BE"/>
        <!-- Nose -->
        <rect x="10" y="6" width="1" height="1" fill="black"/>
        <!-- Muzzle highlight -->
        <rect x="7" y="7" width="4" height="1" fill="#F5F5F7"/>
        <rect x="9" y="5" width="3" height="1" fill="#F5F5F7"/>
        <!-- Shadow under muzzle -->
        <rect x="7" y="7" width="2" height="1" fill="black" fill-opacity="0.1"/>
        <rect x="6" y="6" width="1" height="1" fill="black" fill-opacity="0.1"/>
        <!-- Eyes (drawn last for highest z) -->
        <rect x="8" y="4" width="1" height="2" fill="black"/>
        <rect x="11" y="4" width="1" height="2" fill="black"/>
      </g>
    </g>
  </g>

  <!-- ! Exclamation mark (outside obj — floats independently) -->
  <g id="dessert-fox-*{id}-notif-exclam" transform="translate(15, -13)">
    <rect x="0" y="0" width="2" height="5" fill="#FFB800"/>
    <rect x="0" y="6" width="2" height="2" fill="#FFB800"/>
  </g>
</svg>

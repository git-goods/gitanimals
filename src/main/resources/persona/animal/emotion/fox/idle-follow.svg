<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45">
  <!--
    Dessert Fox — base idle (iteration 3, animated, eye tracking still disabled)
    Derived from dessert-fox (2).svg reference
    Unique keyframe prefix "dessert-fox-*{id}-idle-" to avoid collisions
  -->
  <style>
    @keyframes dessert-fox-*{id}-idle-leg-left {
      0%   { transform: translate(5px, 5px); }
      50%  { transform: translate(5px, 5px) rotate(10deg); }
      100% { transform: translate(5px, 5px); }
    }
    @keyframes dessert-fox-*{id}-idle-leg-right {
      0%   { transform: translate(8px, 5px); }
      50%  { transform: translate(8px, 5px) rotate(-10deg); }
      100% { transform: translate(8px, 5px); }
    }
    @keyframes dessert-fox-*{id}-idle-head {
      0%   { transform: translate(0px, -5px) rotate(0deg); }
      50%  { transform: translate(2px, -6px) rotate(10deg); }
      100% { transform: translate(0px, -5px) rotate(0deg); }
    }
    @keyframes dessert-fox-*{id}-idle-obj {
      0%   { transform: translate(0, 0); }
      15%  { transform: translate(0, -2.5px); }
      30%  { transform: translate(0, 0); }
      100% { transform: translate(0, 0); }
    }
    @keyframes dessert-fox-*{id}-idle-shadow {
      0%   { transform: translate(3px, 7px) scaleX(1); }
      15%  { transform: translate(3px, 7px) scaleX(1.2); }
      30%  { transform: translate(3px, 7px) scaleX(1); }
      100% { transform: translate(3px, 7px) scaleX(1); }
    }

    #dessert-fox-*{id}-idle-shadow {
      animation: dessert-fox-*{id}-idle-shadow 2s ease-in-out infinite;
    }
    #dessert-fox-*{id}-idle-obj {
      animation: dessert-fox-*{id}-idle-obj 2s ease-in-out infinite;
    }
    #dessert-fox-*{id}-idle-leg-left {
      animation: dessert-fox-*{id}-idle-leg-left 1s ease-in-out infinite;
    }
    #dessert-fox-*{id}-idle-leg-right {
      animation: dessert-fox-*{id}-idle-leg-right 1s ease-in-out infinite;
    }
    #dessert-fox-*{id}-idle-head {
      animation: dessert-fox-*{id}-idle-head 1s ease-in-out infinite;
    }
  </style>

  <!-- Shadow -->
  <g id="dessert-fox-*{id}-idle-shadow" transform="translate(3, 7)">
    <rect width="8" height="1" transform="matrix(-1 0 0 1 8 0.5)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="6.76923" height="0.25" transform="matrix(-1 0 0 1 7.38452 0.25)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="6.76923" height="0.25" transform="matrix(-1 0 0 1 7.38452 1.5)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="5.53846" height="0.25" transform="matrix(-1 0 0 1 6.76929 0)" fill="#2B4447" fill-opacity="0.1"/>
    <rect width="5.53846" height="0.25" transform="matrix(-1 0 0 1 6.76929 1.75)" fill="#2B4447" fill-opacity="0.1"/>
  </g>

  <!-- obj: legs + body + head (bouncing group) -->
  <g id="dessert-fox-*{id}-idle-obj">
    <!-- Legs -->
    <g id="dessert-fox-*{id}-idle-leg-left" transform="translate(5, 5)">
      <rect width="2" height="3" fill="#DDD7B5"/>
    </g>
    <g id="dessert-fox-*{id}-idle-leg-right" transform="translate(8, 5)">
      <rect width="2" height="3" fill="#DDD7B5"/>
    </g>

    <!-- Body -->
    <g transform="translate(-2, 2)">
      <rect x="2" y="2" width="3" height="1" fill="#F5F5F7"/>
      <rect x="3" y="3" width="3" height="1" fill="#F5F5F7"/>
      <rect y="3" width="2" height="1" fill="#F5F5F7"/>
      <rect x="3" y="2" width="8" height="1" fill="#DDD7B5"/>
      <rect x="7" width="6" height="4" fill="#DDD7B5"/>
      <rect x="7" y="2" width="6" height="2" fill="#DDD7B5"/>
      <rect x="4" y="2" width="8" height="2" fill="#DDD7B5"/>
      <rect x="6" y="1" width="7" height="3" fill="#DDD7B5"/>
      <rect x="6" y="3" width="7" height="2" fill="#DDD7B5"/>
      <rect x="9" y="2" width="3" height="3" fill="#F5F5F7"/>
      <rect x="8" y="3" width="3" height="2" fill="#F5F5F7"/>
      <rect x="7" y="4" width="3" height="1" fill="#F5F5F7"/>
      <rect x="2" y="1" width="2" height="1" fill="#DDD7B5"/>
      <rect x="1" y="2" width="1" height="1" fill="#DDD7B5"/>
      <rect y="3" width="1" height="1" fill="#DDD7B5"/>
      <rect x="4" y="3" width="2" height="1" fill="black" fill-opacity="0.1"/>
      <rect x="6" y="4" width="2" height="1" fill="black" fill-opacity="0.1"/>
      <rect x="3" y="2" width="1" height="1" fill="black" fill-opacity="0.1"/>
    </g>

    <!-- Head (eyes moved to end for higher z) -->
    <g id="dessert-fox-*{id}-idle-head" transform="translate(0, -5)">
      <rect x="7" y="2" width="4" height="5" fill="#DDD7B5"/>
      <rect x="9" y="5" width="2" height="2" fill="#F5F5F7"/>
      <rect x="6" y="3" width="6" height="4" fill="#DDD7B5"/>
      <rect x="8" y="6" width="4" height="1" fill="#F5F5F7"/>
      <rect x="8" y="6" width="3" height="2" fill="#F5F5F7"/>
      <rect x="6" y="3" width="6" height="1" fill="#DDD7B5"/>
      <rect x="3" y="4" width="12" height="1" fill="#DDD7B5"/>
      <rect x="5" y="3" width="8" height="3" fill="#DDD7B5"/>
      <rect x="7" y="7" width="4" height="1" fill="#DDD7B5"/>
      <!-- Left ear -->
      <rect x="1" y="2" width="4" height="1" fill="#DDD7B5"/>
      <rect y="1" width="4" height="1" fill="#DDD7B5"/>
      <rect x="1" width="2" height="3" fill="#DDD7B5"/>
      <rect x="1" y="1" width="2" height="1" fill="#FBB3BE"/>
      <rect x="2" y="1" width="1" height="2" fill="#FBB3BE"/>
      <rect x="2" y="2" width="2" height="2" fill="#FBB3BE"/>
      <rect x="3" y="3" width="2" height="2" fill="#FBB3BE"/>
      <rect x="3" y="4" width="3" height="1" fill="#FBB3BE"/>
      <!-- Right ear -->
      <rect x="13" y="2" width="4" height="1" fill="#DDD7B5"/>
      <rect x="14" y="1" width="4" height="1" fill="#DDD7B5"/>
      <rect x="15" width="2" height="3" fill="#DDD7B5"/>
      <rect x="15" y="1" width="2" height="1" fill="#FBB3BE"/>
      <rect x="15" y="1" width="1" height="2" fill="#FBB3BE"/>
      <rect x="14" y="2" width="2" height="2" fill="#FBB3BE"/>
      <rect x="13" y="3" width="2" height="2" fill="#FBB3BE"/>
      <rect x="12" y="4" width="3" height="1" fill="#FBB3BE"/>
      <!-- Nose -->
      <rect x="10" y="6" width="1" height="1" fill="black"/>
      <!-- Muzzle highlight -->
      <rect x="7" y="7" width="4" height="1" fill="#F5F5F7"/>
      <rect x="9" y="5" width="3" height="1" fill="#F5F5F7"/>
      <!-- Shadow under muzzle -->
      <rect x="7" y="7" width="2" height="1" fill="black" fill-opacity="0.1"/>
      <rect x="6" y="6" width="1" height="1" fill="black" fill-opacity="0.1"/>
      <!-- Eyes (drawn last for highest z within head) -->
      <rect x="8" y="4" width="1" height="2" fill="black"/>
      <rect x="11" y="4" width="1" height="2" fill="black"/>
    </g>
  </g>
</svg>

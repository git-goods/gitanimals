<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -25 45 45" shape-rendering="crispEdges">
  <!--
    Little Chick — waking (1-shot)
    Walk right → flip → walk left → flip → center (capybara-style)
    Keyframe prefix: lchick-wake-
  -->
  <style>
    @keyframes lchick-wake-obj {
      0%, 4%     { transform: translate(0, 0)    scaleX(1); }
      38%        { transform: translate(6px, 0)   scaleX(1); }
      40%        { transform: translate(6px, 0)   scaleX(0); }
      42%        { transform: translate(6px, 0)   scaleX(-1); }
      78%        { transform: translate(-5px, 0)  scaleX(-1); }
      80%        { transform: translate(-5px, 0)  scaleX(0); }
      82%        { transform: translate(-5px, 0)  scaleX(1); }
      100%       { transform: translate(0, 0)     scaleX(1); }
    }
    @keyframes lchick-wake-leg {
      0%, 4%     { transform: translate(2px, 6px); }
      10%        { transform: translate(2px, 6px) rotate(4deg); }
      17%        { transform: translate(2px, 6px); }
      24%        { transform: translate(2px, 6px) rotate(4deg); }
      31%        { transform: translate(2px, 6px); }
      38%, 42%   { transform: translate(2px, 6px); }
      50%        { transform: translate(2px, 6px) rotate(4deg); }
      57%        { transform: translate(2px, 6px); }
      64%        { transform: translate(2px, 6px) rotate(4deg); }
      71%        { transform: translate(2px, 6px); }
      78%, 82%   { transform: translate(2px, 6px); }
      90%        { transform: translate(2px, 6px) rotate(3deg); }
      100%       { transform: translate(2px, 6px); }
    }
    @keyframes lchick-wake-head {
      0%, 4%     { transform: translate(6px, -2px) rotate(0deg); }
      15%        { transform: translate(6px, -2px) rotate(6deg); }
      30%        { transform: translate(6px, -2px) rotate(0deg); }
      38%, 42%   { transform: translate(6px, -2px) rotate(0deg); }
      55%        { transform: translate(6px, -2px) rotate(6deg); }
      70%        { transform: translate(6px, -2px) rotate(0deg); }
      78%, 82%   { transform: translate(6px, -2px) rotate(0deg); }
      92%        { transform: translate(6px, -2px) rotate(4deg); }
      100%       { transform: translate(6px, -2px) rotate(0deg); }
    }

    #lchick-wake-obj {
      transform-origin: 6px 5px;
      animation: lchick-wake-obj 4s ease-in-out forwards 1;
    }
    #lchick-wake-leg {
      animation: lchick-wake-leg 4s ease-in-out forwards 1;
    }
    #little-chick-head {
      animation: lchick-wake-head 4s ease-in-out forwards 1;
    }
  </style>

  <!-- Shadow -->
  <g transform="translate(-2, 2)">
    <rect width="12" height="3"
      transform="matrix(0.707107 0.707107 0.707107 -0.707107 1.41422 2.12132)" fill="#6F6F6F"
      fill-opacity="0.1"/>
    <rect width="10" height="1"
      transform="matrix(0.707107 0.707107 0.707107 -0.707107 1.41422 3.53553)" fill="#6F6F6F"
      fill-opacity="0.1"/>
    <rect width="8" height="1"
      transform="matrix(0.707107 0.707107 0.707107 -0.707107 1.41422 4.94975)" fill="#6F6F6F"
      fill-opacity="0.1"/>
  </g>


  <!-- Whole body group (walk + flip) -->
  <g id="lchick-wake-obj">
    <!-- Leg (sway during walk) -->
    <g id="lchick-wake-leg" transform="translate(2, 6)">
      <rect width="2" height="2" fill="#FF6F0F"/>
      <rect x="1" y="1" width="2" height="1" fill="#FF6F0F"/>
    </g>

    <!-- Body -->
    <g>
      <rect width="6" height="1" transform="matrix(-1 0 0 1 7 4)" fill="#FFD600"/>
      <rect x="3" y="5" width="5" height="2" fill="#FFD600"/>
      <rect width="9" height="3" transform="matrix(-1 0 0 1 12 4)" fill="#FFD600"/>
      <rect width="6" height="1" transform="matrix(-1 0 0 1 11 8)" fill="#FFD600"/>
      <rect width="7" height="1" transform="matrix(-1 0 0 1 11 7)" fill="#FFD600"/>
      <rect width="4" height="1" transform="matrix(-1 0 0 1 10 9)" fill="#FFD600"/>
      <rect width="6" height="1" transform="matrix(-1 0 0 1 7 1)" fill="#FFD600"/>
      <rect width="1" height="1" transform="matrix(-1 0 0 1 3 5)" fill="#FFD600"/>
      <rect width="3" height="1" transform="matrix(-1 0 0 1 5 0)" fill="#FFD600"/>
      <rect width="7" height="2" transform="matrix(-1 0 0 1 7 2)" fill="#FFD600"/>
      <rect x="1" y="2" width="5" height="2" fill="#FFD600"/>
      <rect x="2" y="1" width="3" height="2" fill="#FFD600"/>
      <rect x="2" y="3" width="5" height="2" fill="#FFD600"/>
      <rect x="4" y="2" width="7" height="5" fill="#FFD600"/>
      <rect x="5" y="7" width="5" height="1" fill="#FFD600"/>
      <rect x="6" y="8" width="4" height="1" fill="#FFD600"/>
    </g>

    <!-- Head (tilt during walk — accessory anchor) -->
    <g id="little-chick-head" transform="translate(6, -2)">
      <rect x="1" y="1" width="4" height="6" fill="#FFD600"/>
      <rect width="1" height="4" transform="matrix(-1 0 0 1 1 1)" fill="#FFD600"/>
      <rect width="1" height="1" transform="matrix(-1 0 0 1 5 1)" fill="#FFD600"/>
      <rect width="1" height="4" transform="matrix(-1 0 0 1 6 2)" fill="#FFD600"/>
      <rect width="3" height="1" transform="matrix(-1 0 0 1 4 0)" fill="#FFD600"/>
      <!-- Beak -->
      <rect x="4" y="4" width="2" height="2" fill="#FF6F0F"/>
      <rect x="5" y="5" width="2" height="1" fill="#FF6F0F"/>
      <!-- Eyes -->
      <rect x="2" y="3" width="1" height="1" fill="black"/>
      <rect x="4" y="2" width="1" height="1" fill="black"/>
    </g>
  </g>
</svg>
